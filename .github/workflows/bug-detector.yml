name: Bug Detector

on:
  push:

jobs:
  detect-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run code and capture error
        run: |
          python app.py 2> error.log || true

      - name: Send error to n8n
        run: |
          ERROR=$(cat error.log | head -n 20 | sed 's/"/\\"/g')
          curl -X POST https://abc123.ngrok.io/webhook/bug-detector \
          -H "Content-Type: application/json" \
          -d "{\"error\":\"$ERROR\"}"
